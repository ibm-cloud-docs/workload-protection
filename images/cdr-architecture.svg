<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="380" viewBox="0 0 1400 380" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Sans, Arial, sans-serif">

  <!-- Background -->
  <rect width="1400" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#161616">CDR for IBM Cloud — Architecture</text>
  <text x="700" y="60" text-anchor="middle" font-size="13" fill="#525252">Activity Tracker → COS → Code Engine → SCC Workload Protection</text>

  <!-- Box 1: IBM Cloud Account -->
  <rect x="20" y="110" width="178" height="90" rx="6" fill="#EDF5FF" stroke="#0F62FE" stroke-width="2"/>
  <rect x="20" y="110" width="178" height="24" rx="6" fill="#0F62FE"/>
  <rect x="20" y="122" width="178" height="12" fill="#0F62FE"/>
  <text x="109" y="127" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">IBM Cloud Account</text>
  <text x="109" y="162" text-anchor="middle" font-size="11" fill="#161616">Audit Events</text>
  <text x="109" y="178" text-anchor="middle" font-size="10" fill="#525252">(API calls, IAM, etc.)</text>

  <!-- Arrow 1: Account → AT -->
  <line x1="198" y1="155" x2="258" y2="155" stroke="#0F62FE" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="228" y="148" text-anchor="middle" font-size="9" fill="#0F62FE">audit</text>

  <!-- Box 2: Activity Tracker Event Routing -->
  <rect x="260" y="110" width="190" height="90" rx="6" fill="#EDF5FF" stroke="#0F62FE" stroke-width="2"/>
  <rect x="260" y="110" width="190" height="24" rx="6" fill="#0F62FE"/>
  <rect x="260" y="122" width="190" height="12" fill="#0F62FE"/>
  <text x="355" y="127" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">Activity Tracker</text>
  <text x="355" y="162" text-anchor="middle" font-size="11" fill="#161616">Event Routing</text>
  <text x="355" y="178" text-anchor="middle" font-size="10" fill="#525252">Target + Route → COS</text>

  <!-- Arrow 2: AT → COS -->
  <line x1="450" y1="155" x2="510" y2="155" stroke="#0F62FE" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="480" y="148" text-anchor="middle" font-size="9" fill="#0F62FE">archive</text>

  <!-- Box 3: COS Bucket -->
  <rect x="512" y="110" width="190" height="90" rx="6" fill="#EDF5FF" stroke="#0F62FE" stroke-width="2"/>
  <rect x="512" y="110" width="190" height="24" rx="6" fill="#0F62FE"/>
  <rect x="512" y="122" width="190" height="12" fill="#0F62FE"/>
  <text x="607" y="127" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">Cloud Object Storage</text>
  <text x="607" y="162" text-anchor="middle" font-size="11" fill="#161616">COS Bucket</text>
  <text x="607" y="178" text-anchor="middle" font-size="10" fill="#525252">Stores AT event archives</text>

  <!-- Arrow 3: COS → CE (wider gap for label) -->
  <line x1="702" y1="155" x2="842" y2="155" stroke="#0F62FE" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="772" y="144" text-anchor="middle" font-size="10" fill="#0F62FE">COS Event Subscription</text>

  <!-- Box 4: Code Engine App -->
  <rect x="844" y="110" width="190" height="90" rx="6" fill="#EDF5FF" stroke="#0F62FE" stroke-width="2"/>
  <rect x="844" y="110" width="190" height="24" rx="6" fill="#0F62FE"/>
  <rect x="844" y="122" width="190" height="12" fill="#0F62FE"/>
  <text x="939" y="127" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">Code Engine</text>
  <text x="939" y="162" text-anchor="middle" font-size="11" fill="#161616">CDR Notification App</text>
  <text x="939" y="178" text-anchor="middle" font-size="10" fill="#525252">sccwp-cdr-app</text>

  <!-- Arrow 4: CE → WP -->
  <line x1="1034" y1="155" x2="1094" y2="155" stroke="#0F62FE" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="1064" y="148" text-anchor="middle" font-size="9" fill="#0F62FE">forward</text>

  <!-- Box 5: SCC Workload Protection -->
  <rect x="1096" y="110" width="270" height="90" rx="6" fill="#EDF5FF" stroke="#0F62FE" stroke-width="2"/>
  <rect x="1096" y="110" width="270" height="24" rx="6" fill="#0F62FE"/>
  <rect x="1096" y="122" width="270" height="12" fill="#0F62FE"/>
  <text x="1231" y="127" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">SCC Workload Protection</text>
  <text x="1231" y="162" text-anchor="middle" font-size="11" fill="#161616">CDR Ingestion &amp;</text>
  <text x="1231" y="178" text-anchor="middle" font-size="11" fill="#161616">Threat Detection</text>

  <!-- Step labels below boxes -->
  <text x="109" y="222" text-anchor="middle" font-size="10" fill="#525252">① Generates</text>
  <text x="109" y="234" text-anchor="middle" font-size="10" fill="#525252">audit events</text>

  <text x="355" y="222" text-anchor="middle" font-size="10" fill="#525252">② Routes to COS</text>
  <text x="355" y="234" text-anchor="middle" font-size="10" fill="#525252">via target + route</text>

  <text x="607" y="222" text-anchor="middle" font-size="10" fill="#525252">③ Stores event</text>
  <text x="607" y="234" text-anchor="middle" font-size="10" fill="#525252">archives</text>

  <text x="939" y="222" text-anchor="middle" font-size="10" fill="#525252">④ Reads &amp; forwards</text>
  <text x="939" y="234" text-anchor="middle" font-size="10" fill="#525252">events</text>

  <text x="1231" y="222" text-anchor="middle" font-size="10" fill="#525252">⑤ Analyzes for</text>
  <text x="1231" y="234" text-anchor="middle" font-size="10" fill="#525252">threats (CDR)</text>

  <!-- Legend -->
  <rect x="20" y="290" width="340" height="60" rx="6" fill="#F4F4F4" stroke="#C6C6C6" stroke-width="1"/>
  <text x="40" y="312" font-size="12" font-weight="600" fill="#161616">Legend</text>
  <line x1="40" y1="335" x2="100" y2="335" stroke="#0F62FE" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="110" y="339" font-size="11" fill="#161616">Data flow (event forwarding)</text>

  <!-- Arrowhead -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0F62FE"/>
    </marker>
  </defs>

</svg>
